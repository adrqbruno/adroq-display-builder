<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdRoq Display Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #eeeae4; color: #1a1a1a; font-family: "Inter", sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
    #app { display: flex; height: 100vh; }
    #sidebar-left  { width: 200px; background: #fff; border-right: 1px solid #e2ddd7; overflow-y: auto; padding: 0; flex-shrink: 0; display: flex; flex-direction: column; }
    #canvas-area   { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 32px 24px; background: #eeeae4; }
    #sidebar-right { width: 272px; background: #fff; border-left: 1px solid #e2ddd7; overflow-y: auto; padding: 20px 16px; flex-shrink: 0; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0cbc4; border-radius: 3px; }
    #app-header { padding: 16px 14px 12px; border-bottom: 1px solid #e2ddd7; display: flex; align-items: center; gap: 8px; }
    #app-logo { width: 28px; height: 28px; background: #111; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #app-logo svg { width: 14px; height: 14px; fill: #fff; }
    #app-title { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1; }
    #app-subtitle { font-size: 10px; color: #999; margin-top: 2px; }
    .format-group-label { padding: 14px 14px 6px; font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .08em; }
    .format-item { padding: 7px 14px; cursor: pointer; border-left: 2px solid transparent; font-size: 12px; color: #666; transition: background .1s; }
    .format-item:hover { background: #f5f2ee; color: #1a1a1a; }
    .format-item.active { background: #f0ece6; border-left-color: #111; color: #111; }
    .format-item strong { font-weight: 500; display: block; }
    .format-item span { display: block; font-size: 10px; color: #aaa; margin-top: 1px; }
    .format-spacer { height: 8px; }
    #mode-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; background: #fff; border: 1px solid #e2ddd7; border-radius: 24px; padding: 4px; width: fit-content; }
    .mode-btn { padding: 5px 16px; border-radius: 20px; border: none; background: transparent; color: #888; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; transition: all .15s; }
    .mode-btn.active { background: #111; color: #fff; font-weight: 600; }
    #replay-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #e2ddd7; background: #fff; color: #666; cursor: pointer; font-size: 12px; font-family: inherit; display: none; margin-left: 4px; }
    #canvas-info { font-size: 11px; color: #aaa; margin-bottom: 16px; }
    #banner-wrapper { flex-shrink: 0; }
    #export-bar { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; justify-content: center; }
    .btn-primary { padding: 9px 20px; border-radius: 20px; border: none; background: #111; color: #fff; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; transition: opacity .15s; }
    .btn-primary:hover { opacity: .85; }
    .btn-outline { padding: 9px 20px; border-radius: 20px; border: 1px solid #ccc; background: #fff; color: #333; cursor: pointer; font-weight: 500; font-size: 13px; font-family: inherit; }
    .btn-outline:hover { background: #f5f2ee; }
    .btn-ghost { padding: 9px 16px; border-radius: 20px; border: 1px solid #e2ddd7; background: transparent; color: #999; cursor: pointer; font-size: 13px; font-family: inherit; }
    .btn-primary:disabled { opacity: .4; cursor: default; }
    #layer-tabs { font-size: 10px; font-weight: 700; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .08em; }
    #tabs-bar { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 18px; }
    .tab-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #e2ddd7; background: #fff; color: #888; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; }
    .tab-btn.active { background: #111; color: #fff; border-color: #111; font-weight: 600; }
    .ctrl-section-title { font-size: 10px; font-weight: 700; color: #999; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .08em; }
    .ctrl-section { margin-bottom: 18px; }
    .ctrl-label { font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
    .ctrl-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .ctrl-col { flex: 1; }
    .ctrl-input { width: 100%; background: #fff; border: 1px solid #e2ddd7; border-radius: 8px; padding: 7px 10px; color: #1a1a1a; font-size: 13px; font-family: inherit; }
    .ctrl-input:focus { outline: none; border-color: #111; }
    select.ctrl-input { cursor: pointer; }
    .ctrl-color-wrap { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #e2ddd7; border-radius: 8px; padding: 4px 8px; }
    .ctrl-color-wrap span { font-size: 12px; color: #888; font-family: monospace; }
    input[type="color"] { width: 26px; height: 26px; border: none; background: none; cursor: pointer; padding: 0; }
    input[type="range"] { width: 100%; accent-color: #111; }
    .upload-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .btn-upload { background: #fff; border: 1px solid #e2ddd7; border-radius: 20px; color: #555; padding: 6px 14px; cursor: pointer; font-size: 12px; font-family: inherit; }
    .upload-ok { font-size: 11px; color: #22a05a; font-weight: 600; }
    .clear-btn-wrap { margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0ece6; }
    .btn-clear { width: 100%; padding: 8px 14px; border-radius: 20px; border: 1px solid #f5c5c5; background: transparent; color: #cc3333; cursor: pointer; font-size: 11px; font-family: inherit; }
    .btn-clear:hover { background: #fff5f5; }

    /* ── Bulk Upload Modal ── */
    #bulk-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100; align-items:center; justify-content:center; }
    #bulk-modal-overlay.open { display:flex; }
    #bulk-modal { background:#fff; border-radius:16px; padding:28px; width:560px; max-height:80vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.18); }
    #bulk-modal h2 { font-size:15px; font-weight:700; margin-bottom:4px; }
    #bulk-modal p { font-size:12px; color:#999; margin-bottom:20px; }
    .bulk-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:10px 12px; background:#f7f4f0; border-radius:10px; }
    .bulk-thumb { width:48px; height:48px; object-fit:cover; border-radius:6px; flex-shrink:0; }
    .bulk-filename { font-size:12px; color:#555; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bulk-select { background:#fff; border:1px solid #e2ddd7; border-radius:8px; padding:6px 8px; font-size:12px; font-family:inherit; cursor:pointer; min-width:160px; }
    #bulk-modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid #f0ece6; }

    /* ── Preview All Modal ── */
    #preview-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:flex-start; justify-content:center; overflow-y:auto; padding:32px 20px; }
    #preview-modal-overlay.open { display:flex; }
    #preview-modal { background:#f5f2ee; border-radius:20px; width:100%; max-width:1100px; padding:32px; box-shadow:0 16px 60px rgba(0,0,0,.3); }
    #preview-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    #preview-modal-header h2 { font-size:16px; font-weight:700; color:#111; }
    #preview-modal-header span { font-size:12px; color:#999; }
    #btn-preview-close { background:#fff; border:1px solid #e2ddd7; border-radius:20px; padding:7px 16px; font-size:13px; cursor:pointer; font-family:inherit; color:#333; }
    .preview-group-label { font-size:10px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:.1em; margin-bottom:16px; margin-top:8px; }
    .preview-grid { display:flex; flex-wrap:wrap; gap:24px; align-items:flex-end; margin-bottom:32px; }
    .preview-cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .preview-cell-info { text-align:center; }
    .preview-cell-name { font-size:11px; font-weight:600; color:#555; }
    .preview-cell-size { font-size:10px; color:#aaa; margin-top:2px; }
    .preview-divider { height:1px; background:#e2ddd7; margin:8px 0 24px; }

    @keyframes adsFadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes adsSlideLeft { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
    @keyframes adsSlideUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes adsZoomIn    { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
    @keyframes adsBounce    { 0%{opacity:0;transform:scale(.6)} 60%{transform:scale(1.1)} 100%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar-left">
    <div id="app-header">
      <div id="app-logo"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg></div>
      <div><div id="app-title">AdRoq</div><div id="app-subtitle">Display Builder</div></div>
    </div>
  </aside>
  <main id="canvas-area">
    <div id="mode-bar">
      <button class="mode-btn active" data-mode="static">Static</button>
      <button class="mode-btn" data-mode="animated">Animated</button>
      <button id="replay-btn">&#9654; Replay</button>
    </div>
    <div id="canvas-info"></div>
    <div id="banner-wrapper"></div>
    <div id="export-bar">
      <button class="btn-primary" id="btn-png">&#8595; Export PNG</button>
      <button class="btn-outline" id="btn-html5">&#8595; Export HTML5</button>
      <button class="btn-outline" id="btn-export-all">&#8595; Export All</button>
      <button class="btn-outline" id="btn-preview-all">&#9707; Preview All</button>
      <button class="btn-outline" id="btn-bulk-upload">&#8679; Bulk Upload</button>
      <button class="btn-ghost" id="btn-reset">Reset</button>
    </div>
  </main>
  <aside id="sidebar-right">
    <div id="layer-tabs">Layers</div>
    <div id="tabs-bar"></div>
    <div id="panel-content"></div>
  </aside>
</div>

<!-- Bulk Upload Modal -->
<div id="bulk-modal-overlay">
  <div id="bulk-modal">
    <h2>Bulk Upload</h2>
    <p>Assign each image to a format. It will be set as the background for that format.</p>
    <div id="bulk-rows"></div>
    <div id="bulk-modal-footer">
      <button class="btn-ghost" id="bulk-cancel">Cancel</button>
      <button class="btn-primary" id="bulk-apply">Apply</button>
    </div>
  </div>
</div>

<!-- Preview All Modal -->
<div id="preview-modal-overlay">
  <div id="preview-modal">
    <div id="preview-modal-header">
      <div>
        <h2>Preview All Formats</h2>
        <span id="preview-modal-count"></span>
      </div>
      <button id="btn-preview-close">✕ Close</button>
    </div>
    <div id="preview-modal-body"></div>
  </div>
</div>

<script>
var FORMATS = [
  { label:"Medium Rectangle",    w:300,  h:250,  cat:"IAB" },
  { label:"Leaderboard",         w:728,  h:90,   cat:"IAB" },
  { label:"Wide Skyscraper",     w:160,  h:600,  cat:"IAB" },
  { label:"Half Page",           w:300,  h:600,  cat:"IAB" },
  { label:"Billboard",           w:970,  h:250,  cat:"IAB" },
  { label:"Mobile Banner",       w:320,  h:50,   cat:"IAB" },
  { label:"Mobile Interstitial", w:320,  h:100,  cat:"IAB" },
  { label:"Large Leaderboard",   w:970,  h:90,   cat:"IAB" },
  { label:"Large Rectangle",     w:336,  h:280,  cat:"IAB" },
  { label:"Small Rectangle",     w:180,  h:150,  cat:"IAB" },
  { label:"Skyscraper",          w:120,  h:600,  cat:"IAB" },
  { label:"Square",              w:250,  h:250,  cat:"IAB" },
  { label:"Small Square",        w:200,  h:200,  cat:"IAB" },
  { label:"Vertical Banner",     w:120,  h:240,  cat:"IAB" },
  { label:"Banner",              w:468,  h:60,   cat:"IAB" },
  { label:"Half Banner",         w:234,  h:60,   cat:"IAB" },
  { label:"Portrait",            w:300,  h:1050, cat:"IAB" },
  { label:"Native Feed",         w:1200, h:628,  cat:"Native" },
  { label:"Native Square",       w:1080, h:1080, cat:"Native" },
  { label:"Native Story",        w:1080, h:1920, cat:"Native" },
];
var FONTS = ["Inter","Arial","Georgia","Helvetica","Trebuchet MS","Verdana"];
var ANIMS = ["none","fade-in","slide-left","slide-up","zoom-in","bounce"];
var ANIM_MAP = {"fade-in":"adsFadeIn","slide-left":"adsSlideLeft","slide-up":"adsSlideUp","zoom-in":"adsZoomIn","bounce":"adsBounce"};
var SCALE_MAX = 420;
var PREVIEW_MAX = 200;
function getScale(fmt){ return Math.min(1, SCALE_MAX/Math.max(fmt.w,fmt.h)); }
function getPreviewScale(fmt){ return Math.min(1, PREVIEW_MAX/Math.max(fmt.w,fmt.h)); }

function defaultLayers(fmt){
  var w=fmt?fmt.w:300, h=fmt?fmt.h:250;
  var isThin=h<=100, isWide=w>=700&&h>=200&&w>h&&w!==1080;
  var isPortrait=w===300&&h===1050, isSquare=w===1080&&h===1080;
  var isStory=w===1080&&h===1920, isFeed=w===1200&&h===628;
  var area=w*h, minDim=Math.min(w,h);
  var hlSize,bdSize,ctaSize,ctaW,ctaH,hlX,hlY,bdX,bdY,ctaX,ctaY;
  if(isThin){
    hlSize=Math.max(11,Math.round(minDim*0.22));bdSize=0;ctaSize=Math.max(10,Math.round(minDim*0.14));
    ctaW=Math.round(w*0.25);ctaH=Math.round(h*0.60);hlX=50;hlY=50;bdX=50;bdY=50;ctaX=50;ctaY=50;
  } else if(isSquare){
    hlSize=126;bdSize=70;ctaSize=76;ctaW=1152;ctaH=126;hlX=50;hlY=26;bdX=50;bdY=54;ctaX=50;ctaY=92;
  } else if(isStory){
    hlSize=150;bdSize=100;ctaSize=70;ctaW=1000;ctaH=200;hlX=50;hlY=19;bdX=50;bdY=54;ctaX=50;ctaY=92;
  } else if(isFeed){
    hlSize=80;bdSize=46;ctaSize=50;ctaW=360;ctaH=90;hlX=50;hlY=36;bdX=50;bdY=56;ctaX=50;ctaY=76;
  } else if(isWide){
    hlSize=Math.round(h*0.16);bdSize=Math.round(h*0.09);ctaSize=Math.round(h*0.09);
    ctaW=Math.round(h*1.1);ctaH=Math.round(h*0.20);hlX=50;hlY=35;bdX=50;bdY=54;ctaX=50;ctaY=76;
  } else if(isPortrait){
    hlSize=Math.round(Math.sqrt(area)*0.07);bdSize=Math.round(Math.sqrt(area)*0.043);
    ctaSize=Math.round(Math.sqrt(area)*0.047);ctaW=Math.round(w*0.78);ctaH=Math.round(Math.sqrt(area)*0.11);
    hlX=50;hlY=36;bdX=50;bdY=52;ctaX=50;ctaY=72;
  } else {
    hlSize=Math.round(Math.sqrt(area)*0.09);bdSize=Math.round(Math.sqrt(area)*0.055);
    ctaSize=Math.round(Math.sqrt(area)*0.06);ctaW=Math.round(Math.sqrt(area)*0.48);
    ctaH=Math.round(Math.sqrt(area)*0.14);hlX=50;hlY=38;bdX=50;bdY=56;ctaX=50;ctaY=76;
  }
  return {
    bg:{color:"#1a1a2e"},
    image:{src:null,x:0,y:0,w:100,h:100,opacity:100},
    logo:{src:null,x:10,y:10,w:80,h:40,opacity:100},
    visual:{src:null,x:50,y:50,w:200,h:200,opacity:100},
    headline:{text:"Your Headline Here",color:"#ffffff",size:hlSize,font:"Inter",bold:true,x:hlX,y:hlY,anim:"fade-in"},
    body:{text:"Supporting message goes here",color:"#cccccc",size:bdSize,font:"Inter",bold:false,x:bdX,y:bdY,anim:"slide-up"},
    cta:{text:"Learn More",bgColor:"#0066ff",textColor:"#ffffff",size:ctaSize,font:"Inter",w:ctaW,h:ctaH,radius:6,x:ctaX,y:ctaY,anim:"zoom-in"},
  };
}

var state = { fmt:FORMATS[0], layers:defaultLayers(FORMATS[0]), mode:"static", activeTab:"bg" };
var savedLayers = {};
var formatImages = {};

function saveCurrent(){ savedLayers[state.fmt.label]=JSON.parse(JSON.stringify(state.layers)); }
function loadFormat(fmt){
  var prevLogo=state.layers.logo, prevVisual=state.layers.visual;
  saveCurrent(); state.fmt=fmt;
  if(savedLayers[fmt.label]){ state.layers=JSON.parse(JSON.stringify(savedLayers[fmt.label])); }
  else { state.layers=defaultLayers(fmt); if(formatImages[fmt.label]) state.layers.image.src=formatImages[fmt.label]; }
  state.layers.logo=JSON.parse(JSON.stringify(prevLogo));
  state.layers.visual=JSON.parse(JSON.stringify(prevVisual));
}

// ── Banner builder (shared by preview + main canvas) ─────────────────────────
function buildBanner(fmt, layers, sc, animating) {
  var W=fmt.w*sc, H=fmt.h*sc, thin=fmt.h<=100;
  var banner=document.createElement("div");
  banner.style.cssText="width:"+W+"px;height:"+H+"px;position:relative;overflow:hidden;background:"+layers.bg.color+";border-radius:3px;";
  if(layers.image.src){var i1=document.createElement("img");i1.src=layers.image.src;i1.style.cssText="position:absolute;left:"+layers.image.x+"%;top:"+layers.image.y+"%;width:"+layers.image.w+"%;height:"+layers.image.h+"%;object-fit:cover;opacity:"+layers.image.opacity/100+";";banner.appendChild(i1);}
  if(layers.logo.src){var i2=document.createElement("img");i2.src=layers.logo.src;i2.style.cssText="position:absolute;left:"+(layers.logo.x*sc)+"px;top:"+(layers.logo.y*sc)+"px;width:"+(layers.logo.w*sc)+"px;height:"+(layers.logo.h*sc)+"px;object-fit:contain;opacity:"+layers.logo.opacity/100+";";banner.appendChild(i2);}
  if(layers.visual.src){var i3=document.createElement("img");i3.src=layers.visual.src;i3.style.cssText="position:absolute;left:"+layers.visual.x+"%;top:"+layers.visual.y+"%;transform:translate(-50%,-50%);width:"+(layers.visual.w*sc)+"px;height:"+(layers.visual.h*sc)+"px;object-fit:contain;opacity:"+layers.visual.opacity/100+";";banner.appendChild(i3);}
  if(thin){
    var pad=Math.round(H*0.15),ctaW=Math.min(layers.cta.w*sc,W*0.35),ctaH=Math.min(layers.cta.h*sc,H*0.72);
    var hl=document.createElement("div");hl.textContent=layers.headline.text;
    hl.style.cssText="position:absolute;left:"+pad+"px;top:50%;transform:translateY(-50%);width:"+(W-ctaW-pad*3.5)+"px;color:"+layers.headline.color+";font-size:"+(layers.headline.size*sc)+"px;font-family:"+layers.headline.font+";font-weight:"+(layers.headline.bold?700:400)+";line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"+anim(layers.headline.anim,0.1,animating);
    banner.appendChild(hl);
    var ct=document.createElement("div");ct.textContent=layers.cta.text;
    ct.style.cssText="position:absolute;right:"+pad+"px;top:50%;transform:translateY(-50%);background:"+layers.cta.bgColor+";color:"+layers.cta.textColor+";font-size:"+(layers.cta.size*sc)+"px;font-family:"+layers.cta.font+";width:"+ctaW+"px;height:"+ctaH+"px;border-radius:"+layers.cta.radius+"px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;white-space:nowrap;"+anim(layers.cta.anim,0.4,animating);
    banner.appendChild(ct);
  } else {
    var hl2=document.createElement("div");hl2.textContent=layers.headline.text;
    hl2.style.cssText="position:absolute;left:"+layers.headline.x+"%;top:"+layers.headline.y+"%;transform:translate(-50%,-50%);text-align:center;width:85%;color:"+layers.headline.color+";font-size:"+(layers.headline.size*sc)+"px;font-family:"+layers.headline.font+";font-weight:"+(layers.headline.bold?700:400)+";line-height:1.2;word-wrap:break-word;"+anim(layers.headline.anim,0.1,animating);
    banner.appendChild(hl2);
    var bd=document.createElement("div");bd.textContent=layers.body.text;
    bd.style.cssText="position:absolute;left:"+layers.body.x+"%;top:"+layers.body.y+"%;transform:translate(-50%,-50%);text-align:center;width:80%;color:"+layers.body.color+";font-size:"+(layers.body.size*sc)+"px;font-family:"+layers.body.font+";font-weight:"+(layers.body.bold?700:400)+";line-height:1.4;word-wrap:break-word;"+anim(layers.body.anim,0.35,animating);
    banner.appendChild(bd);
    var ctaW2=Math.min(layers.cta.w*sc,W*0.85),ctaH2=layers.cta.h*sc;
    var ct2=document.createElement("div");ct2.textContent=layers.cta.text;
    ct2.style.cssText="position:absolute;left:"+layers.cta.x+"%;top:"+layers.cta.y+"%;transform:translate(-50%,-50%);background:"+layers.cta.bgColor+";color:"+layers.cta.textColor+";font-size:"+(layers.cta.size*sc)+"px;font-family:"+layers.cta.font+";width:"+ctaW2+"px;height:"+ctaH2+"px;border-radius:"+layers.cta.radius+"px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;white-space:nowrap;"+anim(layers.cta.anim,0.6,animating);
    banner.appendChild(ct2);
  }
  return banner;
}

function openPreviewAll(){
  saveCurrent();

  if(edited.length===0){ alert("No formats edited yet — make some changes first."); return; }

  var body=document.getElementById("preview-modal-body");
  body.innerHTML="";
  document.getElementById("preview-modal-count").textContent=edited.length+" format"+(edited.length===1?"":"s");

  var cats=["IAB","Native"];
  cats.forEach(function(cat){
    var fmts=edited.filter(function(f){ return f.cat===cat; });
    if(!fmts.length) return;

    var groupLbl=document.createElement("div");
    groupLbl.className="preview-group-label";
    groupLbl.textContent=cat==="IAB"?"IAB Formats":"Native Formats";
    body.appendChild(groupLbl);

    var grid=document.createElement("div");
    grid.className="preview-grid";

    fmts.forEach(function(fmt){
      var layers=savedLayers[fmt.label];
      var sc=getPreviewScale(fmt);
      var W=fmt.w*sc, H=fmt.h*sc;

      var cell=document.createElement("div");

        document.querySelectorAll(".format-item").forEach(function(el){
          if(el.querySelector("strong")&&el.querySelector("strong").textContent===f.label) el.classList.add("active");
        });

      };})(fmt);

  inp.onchange=function(e){
    var files=Array.from(e.target.files); if(!files.length)return;
    Promise.all(files.map(function(f){ return new Promise(function(res){ var r=new FileReader(); r.onload=function(ev){res({name:f.name,src:ev.target.result});}; r.readAsDataURL(f); }); })).then(function(results){
      bulkFiles=results; renderBulkRows(); document.getElementById("bulk-modal-overlay").classList.add("open");
    });
  }; inp.click();
}
function renderBulkRows(){
  var container=document.getElementById("bulk-rows"); container.innerHTML="";
  bulkFiles.forEach(function(file,i){
    var row=document.createElement("div"); row.className="bulk-row";
    var thumb=document.createElement("img"); thumb.className="bulk-thumb"; thumb.src=file.src;
    var name=document.createElement("div"); name.className="bulk-filename"; name.textContent=file.name;
    var sel=document.createElement("select"); sel.className="bulk-select"; sel.dataset.fileIndex=i;
    var blank=document.createElement("option"); blank.value=""; blank.textContent="— select format —"; sel.appendChild(blank);
    FORMATS.forEach(function(fmt){ var opt=document.createElement("option"); opt.value=fmt.label; opt.textContent=fmt.label+" ("+fmt.w+"×"+fmt.h+")"; sel.appendChild(opt); });
    var lower=file.name.toLowerCase();
    FORMATS.forEach(function(fmt){
      var key=fmt.label.toLowerCase().replace(/ /g,"_");
      if(lower.includes(key)||lower.includes(fmt.w+"x"+fmt.h)||lower.includes(fmt.w+"×"+fmt.h)||lower.includes(fmt.w+"x"+fmt.h+"px")||lower.includes(fmt.w+"×"+fmt.h+"px")) sel.value=fmt.label;
    });
    row.appendChild(thumb); row.appendChild(name); row.appendChild(sel); container.appendChild(row);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function buildFormatSidebar(){
  var sidebar=document.getElementById("sidebar-left"), header=document.getElementById("app-header");
  sidebar.innerHTML=""; sidebar.appendChild(header);
  ["IAB","Native"].forEach(function(cat){
    var lbl2=document.createElement("div"); lbl2.className="format-group-label"; lbl2.textContent=cat==="IAB"?"IAB Formats":"Native"; sidebar.appendChild(lbl2);
    FORMATS.filter(function(f){return f.cat===cat;}).forEach(function(fmt){
      var item=document.createElement("div"); item.className="format-item"+(fmt.label===state.fmt.label?" active":"");
      item.innerHTML="<strong>"+fmt.label+"</strong><span>"+fmt.w+"×"+fmt.h+"</span>";
      item.onclick=function(){ loadFormat(fmt); document.querySelectorAll(".format-item").forEach(function(el){el.classList.remove("active");}); item.classList.add("active"); refresh(); };
      sidebar.appendChild(item);
    });
    var spacer=document.createElement("div"); spacer.className="format-spacer"; sidebar.appendChild(spacer);
  });
}
function buildTabs(){
  var bar=document.getElementById("tabs-bar"); bar.innerHTML="";
  Object.keys(PANELS).forEach(function(key){
    var btn=document.createElement("button"); btn.className="tab-btn"+(key===state.activeTab?" active":""); btn.textContent=key;
    btn.onclick=function(){ state.activeTab=key; document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");}); btn.classList.add("active"); renderPanel(key); };
    bar.appendChild(btn);
  });
}
function initModeBar(){
  var btns=document.querySelectorAll(".mode-btn"), replay=document.getElementById("replay-btn");
  btns.forEach(function(btn){ btn.onclick=function(){ state.mode=btn.dataset.mode; btns.forEach(function(b){b.classList.remove("active");}); btn.classList.add("active"); replay.style.display=state.mode==="animated"?"inline-block":"none"; triggerAnim(); }; });
  replay.onclick=triggerAnim;
}
function triggerAnim(){ if(state.mode!=="animated")return; renderPreview(false); setTimeout(function(){renderPreview(true);},50); }
function refresh(){ renderPreview(state.mode==="animated"); renderPanel(state.activeTab); }

document.getElementById("btn-png").onclick=exportPNG;
document.getElementById("btn-html5").onclick=exportHTML5;
document.getElementById("btn-export-all").onclick=exportAll;
document.getElementById("btn-preview-all").onclick=openPreviewAll;
document.getElementById("btn-bulk-upload").onclick=openBulkModal;
document.getElementById("btn-reset").onclick=function(){ state.layers=defaultLayers(state.fmt); delete savedLayers[state.fmt.label]; refresh(); };
document.getElementById("btn-preview-close").onclick=function(){ document.getElementById("preview-modal-overlay").classList.remove("open"); };
document.getElementById("preview-modal-overlay").onclick=function(e){ if(e.target.id==="preview-modal-overlay") document.getElementById("preview-modal-overlay").classList.remove("open"); };
document.getElementById("bulk-cancel").onclick=function(){ document.getElementById("bulk-modal-overlay").classList.remove("open"); bulkFiles=[]; };
document.getElementById("bulk-apply").onclick=function(){
  document.querySelectorAll(".bulk-select").forEach(function(sel){ var fmtLabel=sel.value; if(!fmtLabel)return; var idx=Number(sel.dataset.fileIndex); formatImages[fmtLabel]=bulkFiles[idx].src; if(savedLayers[fmtLabel])savedLayers[fmtLabel].image.src=bulkFiles[idx].src; });
  if(formatImages[state.fmt.label]) state.layers.image.src=formatImages[state.fmt.label];
  document.getElementById("bulk-modal-overlay").classList.remove("open"); bulkFiles=[]; refresh();
};
document.getElementById("bulk-modal-overlay").onclick=function(e){ if(e.target.id==="bulk-modal-overlay"){ document.getElementById("bulk-modal-overlay").classList.remove("open"); bulkFiles=[]; } };

buildFormatSidebar(); buildTabs(); initModeBar(); refresh();
</script>
</body>
</html>
